<div class="rt-toolbar" data-target="{{ target_id }}">
  <div class="rt-group">
    <button type="button" class="rt-btn" data-cmd="b" title="Жирный"><b>B</b></button>
    <button type="button" class="rt-btn" data-cmd="i" title="Курсив"><i>I</i></button>
    <button type="button" class="rt-btn" data-cmd="u" title="Подчёркнутый"><u>U</u></button>
  </div>

  <div class="rt-group">
    <button type="button" class="rt-btn" data-size="14" title="14px">A14</button>
    <button type="button" class="rt-btn" data-size="16" title="16px">A16</button>
    <button type="button" class="rt-btn" data-size="20" title="20px">A20</button>
  </div>

  <div class="rt-group">
    <button type="button" class="rt-color" data-color="#000000" data-swatch-color="#000000" title="Чёрный"></button>
    <button type="button" class="rt-color" data-color="#1D4ED8" data-swatch-color="#1D4ED8" title="Синий"></button>
    <button type="button" class="rt-color" data-color="#15803D" data-swatch-color="#15803D" title="Зелёный"></button>
    <button type="button" class="rt-color" data-color="#B91C1C" data-swatch-color="#B91C1C" title="Красный"></button>
  </div>
</div>
